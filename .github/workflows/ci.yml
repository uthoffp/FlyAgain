name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-server:
    name: Build & Test Server
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: server

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build & test
        run: ./gradlew build

      - name: Upload test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: server-test-reports
          path: |
            server/common/build/test-results/
            server/database-service/build/test-results/
            server/login-service/build/test-results/
            server/account-service/build/test-results/
            server/world-service/build/test-results/
          retention-days: 14

  test-client:
    name: Test Client (gdUnit4)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Run gdUnit4 tests
        uses: godot-gdunit-labs/gdUnit4-action@v1
        with:
          godot-version: '4.4'
          project_dir: './client/'
          paths: 'res://tests'
          timeout: 5
          retries: 1